apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reacting-to-ai-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Main application: http://localhost/
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reacting-to-ai
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitor-agent-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Monitor Agent: http://localhost/monitor(/|$)(.*)
          - path: /monitor(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: monitor-agent
                port:
                  number: 8082
---

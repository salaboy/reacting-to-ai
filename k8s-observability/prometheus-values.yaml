grafana:
  enabled: false

prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
      - job_name: otel-collector-spanmetrics
        scrape_interval: 5s
        static_configs:
          - targets:
              - otel-collector-opentelemetry-collector.opentelemetry.svc.cluster.local:8889

kubeEtcd:
  enabled: false

additionalPrometheusRulesMap:
  error-rate-alerts:
    groups:
      - name: reacting-to-ai
        interval: 5s
        rules:
          - alert: HighErrorRate
            expr: |
              sum by (service_name, span_name) (rate(traces_span_metrics_calls_total{status_code="STATUS_CODE_ERROR"}[1m])) > 0
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.service_name }}"
              description: "Errors detected on {{ $labels.service_name }} / {{ $labels.span_name }} (current rate: {{ $value | humanize }}/s)."

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi
  config:
    global:
      resolve_timeout: 1m
    inhibit_rules:
      - source_matchers:
          - "severity = critical"
        target_matchers:
          - "severity =~ warning|info"
        equal:
          - "namespace"
          - "alertname"
      - source_matchers:
          - "severity = warning"
        target_matchers:
          - "severity = info"
        equal:
          - "namespace"
          - "alertname"
      - source_matchers:
          - "alertname = InfoInhibitor"
        target_matchers:
          - "severity = info"
        equal:
          - "namespace"
      - target_matchers:
          - "alertname = InfoInhibitor"
    route:
      receiver: monitor-agent-webhook
      group_by: [alertname, service_name]
      group_wait: 5s
      group_interval: 10s
      repeat_interval: 1m
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: monitor-agent-webhook
        webhook_configs:
          - url: http://monitor-agent.default.svc.cluster.local:8082/api/webhook/alerts
            send_resolved: true
    templates:
      - "/etc/alertmanager/config/*.tmpl"

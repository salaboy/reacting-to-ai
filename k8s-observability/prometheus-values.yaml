grafana:
  enabled: false

prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
      - job_name: otel-collector-spanmetrics
        scrape_interval: 15s
        static_configs:
          - targets:
              - otel-collector-opentelemetry-collector.opentelemetry.svc.cluster.local:8889

additionalPrometheusRulesMap:
  error-rate-alerts:
    groups:
      - name: reacting-to-ai
        rules:
          - alert: HighErrorRate
            expr: |
              (
                sum by (service_name, span_name) (rate(calls_total{status_code="STATUS_CODE_ERROR"}[1m]))
                /
                sum by (service_name, span_name) (rate(calls_total[1m]))
              ) > 0.05
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.service_name }}"
              description: "Error rate for {{ $labels.service_name }} / {{ $labels.span_name }} has exceeded 5% over the last minute (current: {{ $value | humanizePercentage }})."

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi
  config:
    route:
      receiver: monitor-agent-webhook
      group_by: [alertname, service_name]
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 5m
    receivers:
      - name: monitor-agent-webhook
        webhook_configs:
          - url: http://monitor-agent.default.svc.cluster.local:8082/api/webhook/alerts
            send_resolved: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: reacting-to-ai
  labels:
    app: reacting-to-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reacting-to-ai
  template:
    metadata:
      labels:
        app: reacting-to-ai
    spec:
      containers:
        - name: reacting-to-ai
          image: ghcr.io/salaboy/reacting-to-ai:main
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.opentelemetry.svc.cluster.local:4317
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 128Mi
